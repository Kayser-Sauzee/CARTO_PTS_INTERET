<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Carte Mobile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: Arial, sans-serif; }
#map { height: 100vh; }

/* ── Spinner ── */
#loader {
  position: fixed;
  inset: 0;
  background: rgba(255, 255, 255, 0.8);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}
#loader.hidden { display: none; }
.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid #ddd;
  border-top-color: #3266ad;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Marqueur utilisateur pulsant ── */
.user-marker {
  background: none !important;
  border: none !important;
}
.user-dot-wrapper {
  position: relative;
  width: 20px;
  height: 20px;
}
.user-dot {
  position: absolute;
  inset: 0;
  background: #3266ad;
  border-radius: 50%;
  border: 3px solid white;
  box-shadow: 0 1px 5px rgba(0, 0, 0, 0.4);
  z-index: 2;
}
.user-pulse {
  position: absolute;
  inset: -7px;
  background: rgba(50, 102, 173, 0.25);
  border-radius: 50%;
  animation: pulse 2s ease-out infinite;
  z-index: 1;
}
@keyframes pulse {
  0% { transform: scale(0.5); opacity: 1; }
  100% { transform: scale(1.9); opacity: 0; }
}

/* ── Bottom sheet ── */
#panel {
  position: fixed;
  bottom: -440px;
  left: 0;
  width: 100%;
  height: 440px;
  background: white;
  border-top-left-radius: 18px;
  border-top-right-radius: 18px;
  box-shadow: 0 -3px 16px rgba(0, 0, 0, 0.18);
  padding: 12px 18px 28px;
  transition: bottom 0.32s cubic-bezier(0.4, 0, 0.2, 1);
  overflow-y: auto;
  z-index: 1000;
}
#panel.open { bottom: 0; }

#handle {
  width: 44px;
  height: 5px;
  background: #ccc;
  border-radius: 4px;
  margin: 0 auto 14px;
  cursor: grab;
}

#content h3 {
  margin: 0 0 6px;
  font-size: 17px;
  color: #111;
}
.type-badge {
  display: inline-block;
  font-size: 11px;
  font-weight: bold;
  color: white;
  padding: 3px 10px;
  border-radius: 20px;
  margin-bottom: 14px;
}
#content p {
  margin: 7px 0;
  font-size: 14px;
  color: #444;
  display: flex;
  align-items: flex-start;
  gap: 8px;
  line-height: 1.5;
}
#content a {
  color: #3266ad;
  text-decoration: none;
}
#content a:hover {
  text-decoration: underline;
}

/* ── Boutons carte ── */
.map-btn {
  background: white;
  padding: 10px 12px;
  font-size: 20px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
  cursor: pointer;
  user-select: none;
  line-height: 1;
  margin-bottom: 10px;
  display: block;
}

/* ── Légende interactive ── */
#legend {
  background: white;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 12px;
  display: none;
  min-width: 200px;
  max-height: 70vh;
  overflow-y: auto;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
  margin-bottom: 6px;
}
#legend.visible { display: block; }
.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 5px 0;
  color: #333;
  cursor: pointer;
}
.legend-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  border: 2px solid white;
  box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.2);
  flex-shrink: 0;
}
.legend-checkbox {
  margin-right: 6px;
  cursor: pointer;
}

/* ── Viseur central ── */
#crosshair {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 1500;
}
#crosshair.hidden { display: none; }
#crosshair-inner {
  width: 40px;
  height: 40px;
  position: relative;
}
#crosshair-inner::before,
#crosshair-inner::after {
  content: '';
  position: absolute;
  background: #e03232;
  border-radius: 2px;
}
#crosshair-inner::before { width: 2px; height: 100%; top: 0; left: 50%; transform: translateX(-50%); }
#crosshair-inner::after  { width: 100%; height: 2px; top: 50%; left: 0; transform: translateY(-50%); }
/* point central */
#crosshair-inner {
  box-shadow: inset 0 0 0 2px #e03232;
  border-radius: 50%;
  border: 2px solid #e03232;
  background: rgba(224,50,50,0.08);
}
#crosshair-label {
  text-align: center;
  font-size: 11px;
  color: #333;
  background: rgba(255,255,255,0.85);
  border-radius: 8px;
  padding: 3px 8px;
  margin-top: 6px;
  white-space: nowrap;
  box-shadow: 0 1px 4px rgba(0,0,0,0.15);
}

/* ── Bouton "+" flottant ── */
#add-btn {
  position: fixed;
  bottom: 28px;
  right: 18px;
  width: 54px;
  height: 54px;
  background: #3266ad;
  color: white;
  font-size: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 3px 12px rgba(0,0,0,0.3);
  cursor: pointer;
  z-index: 1200;
  user-select: none;
  transition: background 0.2s, transform 0.15s;
  line-height: 1;
}
#add-btn:active { transform: scale(0.93); background: #254d8a; }
#add-btn.active { background: #e03232; }

/* ── Barre de confirmation ── */
#confirm-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px 22px;
  background: white;
  box-shadow: 0 -3px 16px rgba(0,0,0,0.15);
  z-index: 1300;
  border-top-left-radius: 16px;
  border-top-right-radius: 16px;
}
#confirm-bar.hidden { display: none; }
#confirm-address {
  flex: 1;
  font-size: 12px;
  color: #555;
  line-height: 1.4;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
#confirm-bar button {
  border: none;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 13px;
  font-weight: bold;
  cursor: pointer;
  white-space: nowrap;
}
#cancel-btn  { background: #f0f0f0; color: #555; }
#confirm-btn {
  background: #3266ad;
  color: white;
  text-decoration: none;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 13px;
  font-weight: bold;
  white-space: nowrap;
  display: inline-block;
}

/* Adaptation pour mobile */
@media (max-width: 768px) {
  #legend {
    max-height: 50vh;
    margin-bottom: 10px;
  }
}
</style>
</head>

<body>
<div id="loader"><div class="spinner"></div></div>
<div id="map"></div>
<div id="panel">
  <div id="handle"></div>
  <div id="content"></div>
</div>
<!-- Viseur mode ajout -->
<div id="crosshair" class="hidden">
  <div id="crosshair-inner"></div>
  <div id="crosshair-label">Déplacez la carte, puis confirmez</div>
</div>
<!-- Bouton flottant ajout -->
<div id="add-btn" title="Ajouter un point ici">＋</div>
<!-- Barre de confirmation -->
<div id="confirm-bar" class="hidden">
  <button id="cancel-btn">✕ Annuler</button>
  <div id="confirm-address">Chargement…</div>
  <a id="confirm-btn" target="_blank">✓ Ouvrir formulaire</a>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>
/* ══ CONFIG ════════════════════════════════════════════ */
const API_URL  = "https://script.google.com/macros/s/AKfycbwftOih95jjdQRT3if2z9Tkowm2gJQxZa8ZdwVK-Acc1TOReFEnO9fn8V-CD3rglSzT1w/exec";
const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSfEX_UE8x8YAh7RypfVLBaZdMAH_u85SIJFnJKfZ3tSc_bpxw/viewform";

const COLORS = {
  "Hôtel":         "#3266ad",
  "CEREMA":        "#e03232",
  "CEI":           "#2a9a4a",
  "CER":           "#e07c20",
  "Parking autre": "#7e57c2",
  "Restaurant":    "#795548",
  "Autre":         "#757575"
};

/* ══ CARTE ════════════════════════════════════════════ */
const map = L.map('map', { zoomControl: false }).setView([46.8, 2.5], 6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);
L.control.zoom({ position: 'topright' }).addTo(map);

/* ══ CLUSTERS PAR TYPE (FIX LÉGENDE) ════════════════════════════════════════
   Chaque type a son propre MarkerClusterGroup.
   Cela permet d'ajouter / retirer un groupe entier de la carte sans
   casser le clustering des autres types.
*/
const clusterGroups = {};
Object.keys(COLORS).forEach(type => {
  clusterGroups[type] = L.markerClusterGroup({ chunkedLoading: true });
});

/* État des filtres */
const filters = {};
Object.keys(COLORS).forEach(key => filters[key] = true);

/* ══ MARQUEUR UTILISATEUR ════════════════════════════════════════════════════ */
const userIcon = L.divIcon({
  className: 'user-marker',
  html: `<div class="user-dot-wrapper">
           <div class="user-pulse"></div>
           <div class="user-dot"></div>
         </div>`,
  iconSize:   [20, 20],
  iconAnchor: [10, 10]
});

let userMarker = null;

function setUserPos(latlng) {
  if (!userMarker) {
    userMarker = L.marker(latlng, { icon: userIcon, zIndexOffset: 2000 })
      .addTo(map)
      .bindPopup("📍 Vous êtes ici");
  } else {
    userMarker.setLatLng(latlng);
  }
}

navigator.geolocation.watchPosition(
  pos => setUserPos([pos.coords.latitude, pos.coords.longitude]),
  null,
  { enableHighAccuracy: true }
);

/* Bouton centrer */
const locateCtrl = L.control({ position: 'topleft' });
locateCtrl.onAdd = function() {
  const div = L.DomUtil.create('div', 'map-btn');
  div.innerHTML = "📍";
  div.title = "Ma position";
  L.DomEvent.disableClickPropagation(div);
  div.addEventListener('click', () => {
    navigator.geolocation.getCurrentPosition(pos => {
      const ll = [pos.coords.latitude, pos.coords.longitude];
      setUserPos(ll);
      map.setView(ll, 14);
    });
  });
  return div;
};
locateCtrl.addTo(map);

/* ══ LÉGENDE INTERACTIVE ════════════════════════════════════════════ */
const legendCtrl = L.control({ position: 'topleft' });
legendCtrl.onAdd = function() {
  const container = L.DomUtil.create('div', 'legend-container');

  const leg = document.createElement('div');
  leg.id = 'legend';
  leg.innerHTML = '<strong style="font-size:13px;display:block;margin-bottom:8px;">Filtres</strong>';

  Object.entries(COLORS).forEach(([label, color]) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `
      <input type="checkbox" class="legend-checkbox" id="filter-${label}" checked>
      <div class="legend-dot" style="background:${color};"></div>
      <label for="filter-${label}" style="cursor:pointer;">${label}</label>
    `;
    leg.appendChild(item);
  });

  /* FIX : stopPropagation pour que les clics dans la légende
     ne déclenchent pas le long-press de la carte */
  L.DomEvent.disableClickPropagation(leg);
  L.DomEvent.on(leg, 'touchstart touchend touchmove mousedown mouseup', L.DomEvent.stopPropagation);

  leg.addEventListener('change', (e) => {
    if (e.target.classList.contains('legend-checkbox')) {
      const type = e.target.id.replace('filter-', '');
      filters[type] = e.target.checked;
      updateMarkersVisibility();
    }
  });

  const btn = document.createElement('div');
  btn.className = 'map-btn';
  btn.innerHTML = "🗺";
  btn.title = "Légende / Filtres";
  L.DomEvent.disableClickPropagation(btn);
  L.DomEvent.on(btn, 'touchstart touchend mousedown mouseup', L.DomEvent.stopPropagation);
  btn.addEventListener('click', () => leg.classList.toggle('visible'));

  container.appendChild(leg);
  container.appendChild(btn);
  return container;
};
legendCtrl.addTo(map);

/* Met à jour la visibilité des clusters par type */
function updateMarkersVisibility() {
  Object.entries(clusterGroups).forEach(([type, group]) => {
    if (filters[type]) {
      if (!map.hasLayer(group)) map.addLayer(group);
    } else {
      if (map.hasLayer(group)) map.removeLayer(group);
    }
  });
}

/* ══ PANNEAU BAS ════════════════════════════════════════════ */
const panel   = document.getElementById("panel");
const content = document.getElementById("content");
const handle  = document.getElementById("handle");

function fieldHtml(icon, value, href) {
  if (!value || String(value).trim() === "" || value === "undefined" || value === "null") return "";
  const inner = href ? `<a href="${href}" target="_blank">${value}</a>` : value;
  return `<p><span>${icon}</span><span>${inner}</span></p>`;
}

function openPanel(item) {
  const type    = item["Type de point d'intérêt"] || "Point d'intérêt";
  const adresse = item["Adresse"] || "";
  const contact = item["Contact(s)"] || "";
  const phone   = item["Téléphone(s)"] || "";
  const avis    = item["Avis"] || "";
  const date    = item["Date de la dernière visite"] || "";
  const comm    = item["Commentaires"] || "";

  const color    = COLORS[type] || COLORS["Autre"];
  const mapsHref = adresse ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(adresse)}` : null;
  const telHref  = phone   ? `tel:${phone}` : null;

  content.innerHTML = `
    <h3>${type}</h3>
    <span class="type-badge" style="background:${color};">${type}</span>
    ${fieldHtml("📍", adresse, mapsHref)}
    ${fieldHtml("👤", contact)}
    ${fieldHtml("📞", phone, telHref)}
    ${fieldHtml("⭐", avis)}
    ${fieldHtml("📅", date)}
    ${fieldHtml("💬", comm)}
  `;
  panel.classList.add("open");
}

map.on('click', () => panel.classList.remove("open"));

let swipeY = 0;
handle.addEventListener('touchstart', e => { swipeY = e.touches[0].clientY; }, { passive: true });
handle.addEventListener('touchmove',  e => {
  if (e.touches[0].clientY - swipeY > 60) panel.classList.remove("open");
}, { passive: true });

/* ══ ICÔNES POI ════════════════════════════════════════════ */
function makePOIIcon(type) {
  const color = COLORS[type] || COLORS["Autre"];
  return L.divIcon({
    className: 'poi-marker',
    html: `<div style="background:${color};width:22px;height:22px;border-radius:50%;border:3px solid white;box-shadow:0 1px 5px rgba(0,0,0,0.4);"></div>`,
    iconSize:   [22, 22],
    iconAnchor: [11, 11]
  });
}

/* ══ DONNÉES ════════════════════════════════════════════ */
fetch(API_URL)
  .then(res => {
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  })
  .then(data => {
    data.forEach(item => {
      const lat = parseFloat(item["Latitude"]);
      const lon = parseFloat(item["Longitude"]);
      if (isNaN(lat) || isNaN(lon)) return;

      const type   = item["Type de point d'intérêt"] || "Autre";
      const group  = clusterGroups[type] || clusterGroups["Autre"];

      const marker = L.marker([lat, lon], { icon: makePOIIcon(type) })
        .bindPopup(`<b>${type}</b><br>${item["Adresse"] || ""}`)
        .on('click', function(e) {
          L.DomEvent.stopPropagation(e);
          openPanel(item);
        });

      group.addLayer(marker);
    });

    /* Ajoute chaque cluster group sur la carte */
    Object.values(clusterGroups).forEach(group => map.addLayer(group));
  })
  .catch(err => {
    console.error("Erreur chargement :", err);
    content.innerHTML = `<p style="color:#c00;">⚠️ Impossible de charger les données.<br><small>${err.message}</small></p>`;
    panel.classList.add("open");
  })
  .finally(() => {
    document.getElementById('loader').classList.add('hidden');
  });

/* ══ MODE AJOUT : BOUTON + VISEUR CENTRÉ ═══════════════════════════════════
   1. L'utilisateur tape le bouton "+"
   2. Un viseur apparaît au centre de la carte, la carte reste navigable
   3. Il navigue pour pointer l'endroit voulu
   4. Une barre basse affiche l'adresse (reverse geocoding en temps réel)
   5. Il tape "✓ Ouvrir formulaire" → ouvre le formulaire Google
   6. "✕ Annuler" → quitte le mode
*/
const addBtn     = document.getElementById('add-btn');
const crosshair  = document.getElementById('crosshair');
const confirmBar = document.getElementById('confirm-bar');
const confirmBtn = document.getElementById('confirm-btn');
const cancelBtn  = document.getElementById('cancel-btn');
const addrLabel  = document.getElementById('confirm-address');

let addMode       = false;
let geocodeTimer  = null;
let currentLatLng = null;

function enterAddMode() {
  addMode = true;
  addBtn.classList.add('active');
  addBtn.textContent = '✕';
  crosshair.classList.remove('hidden');
  confirmBar.classList.remove('hidden');
  panel.classList.remove('open');
  addrLabel.textContent = 'Chargement…';
  updateFromCenter();
}

function exitAddMode() {
  addMode = false;
  addBtn.classList.remove('active');
  addBtn.textContent = '＋';
  crosshair.classList.add('hidden');
  confirmBar.classList.add('hidden');
  clearTimeout(geocodeTimer);
}

/* Reverse geocoding depuis le centre de la carte */
function updateFromCenter() {
  const c = map.getCenter();
  currentLatLng = c;
  addrLabel.textContent = 'Chargement…';
  confirmBtn.removeAttribute('href');

  clearTimeout(geocodeTimer);
  geocodeTimer = setTimeout(async () => {
    try {
      const r = await fetch(
        `https://nominatim.openstreetmap.org/reverse?format=json&lat=${c.lat}&lon=${c.lng}&accept-language=fr`
      );
      const d = await r.json();
      const adresse = d.display_name || `${c.lat.toFixed(5)}, ${c.lng.toFixed(5)}`;
      addrLabel.textContent = adresse;
      confirmBtn.href = FORM_URL + '&entry.887599449=' + encodeURIComponent(adresse);
    } catch {
      const fallback = `${c.lat.toFixed(5)}, ${c.lng.toFixed(5)}`;
      addrLabel.textContent = fallback;
      confirmBtn.href = FORM_URL + '&entry.887599449=' + encodeURIComponent(fallback);
    }
  }, 600);
}

addBtn.addEventListener('click', () => {
  if (addMode) exitAddMode(); else enterAddMode();
});

cancelBtn.addEventListener('click', exitAddMode);

/* Le lien <a> s'ouvre nativement — on ferme juste le mode après */
confirmBtn.addEventListener('click', () => {
  if (!confirmBtn.href) return;
  setTimeout(exitAddMode, 300);
});

/* Mise à jour de l'adresse à chaque déplacement de la carte */
map.on('moveend', () => { if (addMode) updateFromCenter(); });
</script>
</body>
</html>
